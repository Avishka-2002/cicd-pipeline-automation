version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: devflow_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - devflow_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Express Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devflow_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/devflow
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - devflow_network
    restart: unless-stopped

  # React Frontend Service served by Nginx Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devflow_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - devflow_network
    restart: unless-stopped

networks:
  devflow_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
